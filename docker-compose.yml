services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ${MEDIA_PATH:-./media}:/media:ro
      - ${DB_PATH:-./data}:/data
    environment:
      - Database__Path=/data/portrameta.db
      - Cors__AllowedOrigins=http://localhost:3000
      - Cors__AllowAnyOrigin=false
      # Auth__ApiKey=your-secret-key   # uncomment to enable API key authentication
      - Urls=http://0.0.0.0:5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
